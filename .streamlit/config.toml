# Streamlit Configuration for Mobile-Responsive Dashboard
# Place this file in .streamlit/ directory at project root
# Reference: https://docs.streamlit.io/library/advanced-features/configuration

[browser]
# Mobile-friendly viewport settings
gatherUsageStats = false

[client]
# Mobile optimization
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[theme]
# Professional dark theme (mobile-friendly)
primaryColor = "#667eea"
backgroundColor = "#0f1419"
secondaryBackgroundColor = "#262730"
textColor = "#fafafa"
font = "sans serif"

[server]
# Performance optimization for mobile
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = true

# Port configuration
port = 8501
headless = true

[deprecation]
showPyplotGlobalUse = false
